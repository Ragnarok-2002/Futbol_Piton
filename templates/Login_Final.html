<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión - System Pro Futbol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        // Configuración oficial de los colores del sistema de diseño
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'negro-carbon': '#1A1A1A',
                        'gris-carbon': '#252525',
                        'naranja-fuego': '#E65100',
                        'naranja-suave': '#FFF3E0',
                        'blanco-humo': '#F5F5F5',
                        'amarillo-volt': '#EEFF41',
                        'gris-claro': '#B3B3B3'
                    }
                }
            }
        }
    </script>
    <style>
        /* Efecto Glassmorphism obligatorio del PDF */
        .glass-effect {
            background: rgba(37, 37, 37, 0.85);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-negro-carbon via-negro-carbon to-naranja-fuego min-h-screen flex items-center justify-center p-4 font-sans selection:bg-amarillo-volt selection:text-negro-carbon">

    <div class="glass-effect w-full max-w-md p-8 rounded-3xl shadow-2xl transition-all duration-300 hover:border-white/15">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center justify-center w-20 h-20 rounded-2xl bg-negro-carbon/80 mb-3 shadow-lg shadow-naranja-fuego/20 overflow-hidden">
                <img src="{{ url_for('static', filename='img/logo-escudo.png') }}" alt="System Pro Futbol" class="w-16 h-16 object-contain">
            </div>
            <h1 class="text-blanco-humo text-3xl font-black tracking-tight mb-1">System Pro Futbol</h1>
            <p class="text-gris-claro text-sm font-medium">Gestión Deportiva • Panel de Control</p>
        </div>

        <form action="/login" method="POST" class="space-y-6">
            
            <div class="space-y-2">
                <label for="username" class="text-naranja-suave text-xs font-bold tracking-wider uppercase block">
                    Correo Electrónico
                </label>
                <div class="relative">
                    <input type="text" 
                           id="username" 
                           name="username" 
                           required 
                           placeholder="Ingresa tu correo o usuario" 
                           class="w-full bg-negro-carbon text-blanco-humo placeholder-gris-claro/50 px-4 py-3.5 rounded-2xl border border-white/10 text-sm font-medium transition-all duration-300 focus:outline-none focus:border-amarillo-volt focus:ring-1 focus:ring-amarillo-volt">
                </div>
            </div>

            <div class="space-y-2">
                <div class="flex items-center justify-between ml-1">
                    <label for="password" class="text-naranja-suave text-xs font-bold tracking-wider uppercase">Contraseña</label>
                </div>
                <div class="relative">
                    <input type="password" 
                           id="password" 
                           name="password" 
                           required 
                           placeholder="••••••••" 
                           class="w-full bg-negro-carbon text-blanco-humo placeholder-gris-claro/50 px-4 py-3.5 rounded-2xl border border-white/10 text-sm font-medium transition-all duration-300 focus:outline-none focus:border-amarillo-volt focus:ring-1 focus:ring-amarillo-volt">
                </div>
            </div>

            <button type="submit" 
                    class="w-full bg-naranja-fuego text-blanco-humo font-bold text-sm tracking-wide py-4 px-6 rounded-2xl shadow-lg shadow-naranja-fuego/20 transition-all duration-300 hover:bg-orange-700 hover:translate-y-[-2px] hover:shadow-xl hover:shadow-naranja-fuego/30 active:translate-y-[0px] focus:outline-none focus:ring-2 focus:ring-amarillo-volt focus:ring-offset-2 focus:ring-offset-negro-carbon">
                INGRESAR AL SISTEMA
            </button>
        </form>

        <div class="mt-8 pt-6 border-t border-white/5 text-center space-y-4">
            <p class="text-gris-claro text-xs">
                ¿Aún no haces parte de la escuela?
            </p>
            <a href="/registro" class="inline-block w-full py-3 bg-white/5 hover:bg-white/10 text-amarillo-volt font-bold rounded-2xl transition-all duration-300 text-sm border border-white/5 hover:border-amarillo-volt/30 shadow-sm hover:shadow-amarillo-volt/10">
                REGÍSTRATE AQUÍ
            </a>
            
            <p class="text-gris-claro/50 text-[10px] mt-4">
                ¿Problemas con tu acceso? Contacta al administrador.
            </p>
        </div>

    </div>

</body>
</html>
