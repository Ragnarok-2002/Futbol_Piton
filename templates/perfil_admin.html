<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mi Perfil - Configuración</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'negro-carbon': '#1A1A1A',
                        'gris-carbon': '#252525',
                        'naranja-fuego': '#E65100',
                        'naranja-suave': '#FFF3E0',
                        'blanco-humo': '#F5F5F5',
                        'amarillo-volt': '#EEFF41',
                        'gris-claro': '#B3B3B3'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-effect {
            background: rgba(37, 37, 37, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-negro-carbon via-negro-carbon to-naranja-fuego min-h-screen flex items-center justify-center p-4 font-sans">

    <div class="glass-effect w-full max-w-md p-8 rounded-3xl shadow-2xl">
        
        <div class="mb-6 flex items-center gap-4">
            <a href="/dashboard-admin" class="text-gris-claro hover:text-amarillo-volt text-sm font-bold transition-colors">← Volver</a>
            <h1 class="text-blanco-humo text-2xl font-black tracking-tight">⚙️ CONFIGURAR PERFIL</h1>
        </div>

        <p class="text-gris-claro text-xs mb-6 font-medium">Modifica tus credenciales de acceso directo a la base de datos.</p>

        <form action="/actualizar-perfil" method="POST" class="space-y-6">
            
            <div class="space-y-2">
                <label for="username" class="block text-naranja-suave text-xs font-bold tracking-wider uppercase">Nombre de Usuario</label>
                <input type="text" 
                       id="username" 
                       name="username" 
                       required 
                       value="{{ admin.usuario }}"
                       class="w-full bg-negro-carbon text-blanco-humo px-4 py-3.5 rounded-2xl border border-white/10 text-sm focus:outline-none focus:border-amarillo-volt focus:ring-1 focus:ring-amarillo-volt transition-all">
            </div>

            <div class="space-y-2">
                <label for="password" class="text-naranja-suave text-xs font-bold tracking-wider uppercase block">Nueva Contraseña</label>
                <input type="password" 
                       id="password" 
                       name="password" 
                       required 
                       placeholder="Escribe tu nueva clave" 
                       class="w-full bg-negro-carbon text-blanco-humo px-4 py-3.5 rounded-2xl border border-white/10 text-sm focus:outline-none focus:border-amarillo-volt focus:ring-1 focus:ring-amarillo-volt transition-all">
            </div>

            <button type="submit" 
                    class="w-full bg-amarillo-volt text-negro-carbon font-black text-sm tracking-wide py-4 px-6 rounded-2xl shadow-lg transition-all duration-300 hover:scale-[1.02] active:scale-[1]">
                GUARDAR CONFIGURACIÓN
            </button>
        </form>

    </div>

</body>
</html>
