<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Escuela de Fútbol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'negro-carbon': '#1A1A1A',
                        'gris-carbon': '#252525',
                        'naranja-fuego': '#E65100',
                        'naranja-suave': '#FFF3E0',
                        'blanco-humo': '#F5F5F5',
                        'amarillo-volt': '#EEFF41',
                        'gris-claro': '#B3B3B3'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-effect {
            background: rgba(37, 37, 37, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-negro-carbon via-negro-carbon to-naranja-fuego/10 min-h-screen text-blanco-humo font-sans flex items-center justify-center p-4">

    <!-- Contenedor Principal del Formulario -->
    <div class="glass-effect p-8 rounded-3xl border border-white/5 w-full max-w-2xl shadow-2xl relative">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2">Únete al Equipo</h1>
            <p class="text-gris-claro text-sm">Crea tu cuenta como jugador o acudiente para empezar.</p>
        </div>

        <!-- Alertas de Error desde app.py -->
        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-xl mb-6 text-center text-sm font-semibold">
            {{ error }}
        </div>
        {% endif %}

        <form id="registroForm" action="/registro" method="POST" class="space-y-5" onsubmit="validarFormulario(event)"></form>
            <!-- Select Rol -->
            <div>
                <label class="block text-sm font-bold text-naranja-suave mb-1">¿Qué rol tienes?</label>
                <select name="rol" id="rol" required class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="4">Soy Jugador (Independiente)</option>
                    <option value="5">Soy Acudiente (Padre/Madre/Tutor)</option>
                </select>
            </div>

            <!-- Grid para campos de dos columnas -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1">Documento de Identidad</label>
                    <input type="text" name="documento" id="documento" required class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1">Fecha de Nacimiento</label>
                    <!-- color-scheme: dark asegura que el calendario nativo del navegador se vea oscuro -->
                    <input type="date" name="fecha_nacimiento" id="fecha_nacimiento" required class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors" style="color-scheme: dark;">
                </div>
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1">Nombres</label>
                    <input type="text" name="nombres" id="nombres" required class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1">Apellidos</label>
                    <input type="text" name="apellidos" id="apellidos" required class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1">Teléfono</label>
                    <input type="text" name="telefono" id="telefono" required class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1">Correo Electrónico</label>
                    <input type="email" name="email" id="email" required class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors" placeholder="ejemplo@gmail.com">
                </div>
            </div>

            <!-- Contraseña -->
            <div>
                <label class="block text-sm font-bold text-naranja-suave mb-1">Contraseña</label>
                <input type="password" name="password" id="password" required class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
            </div>

            <div class="flex justify-between items-center mt-8 gap-4">
                <a href="/" class="text-sm text-gris-claro hover:text-white transition-colors">Volver al Login</a>
                <!-- Cambiamos type="submit" por button para que primero abra el modal -->
                <button type="submit" class="bg-naranja-fuego hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg shadow-naranja-fuego/20">
                    CONTINUAR REGISTRO
                </button>
            </div>
        </form>
    </div>

    <!-- ========================================== -->
    <!-- MODAL DE CONFIRMACIÓN DE DATOS -->
    <!-- ========================================== -->
    <div id="modalConfirmacion" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <!-- Fondo oscuro (Overlay) -->
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="cerrarModal()"></div>
        
        <!-- Tarjeta del Modal -->
        <div class="bg-gris-carbon border border-white/10 rounded-3xl p-8 w-full max-w-md relative z-10 shadow-2xl">
            <div class="text-center mb-6">
                <div class="text-4xl mb-2 text-amarillo-volt">⚠️</div>
                <h3 class="text-xl font-black text-white">Confirmar Datos</h3>
                <p class="text-xs text-gris-claro mt-2">Por favor, verifica que tu información y rol sean correctos antes de enviar.</p>
            </div>

            <!-- Lista de datos capturados dinámicamente -->
            <div class="space-y-3 bg-negro-carbon/80 p-5 rounded-2xl border border-white/5 text-sm">
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Rol:</span>
                    <span id="modal-rol" class="font-bold text-amarillo-volt text-right"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Documento:</span>
                    <span id="modal-doc" class="text-white text-right break-all"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Nombres:</span>
                    <span id="modal-nombres" class="text-white text-right uppercase"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Apellidos:</span>
                    <span id="modal-apellidos" class="text-white text-right uppercase"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Teléfono:</span>
                    <span id="modal-tel" class="text-white text-right"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Nacimiento:</span>
                    <span id="modal-fecha" class="text-white text-right"></span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-bold text-gris-claro">Correo:</span>
                    <span id="modal-email" class="text-white text-right text-xs break-all ml-4"></span>
                </div>
            </div>

            <!-- Botones del modal -->
            <div class="flex gap-4 mt-8">
                <button type="button" onclick="cerrarModal()" class="flex-1 py-3 bg-white/5 hover:bg-white/10 text-gris-claro hover:text-white text-xs font-bold rounded-xl transition-all border border-white/10">
                    CORREGIR
                </button>
                <button type="button" onclick="enviarFormulario()" class="flex-1 py-3 bg-amarillo-volt hover:bg-[#D4E637] text-negro-carbon text-xs font-black rounded-xl transition-all shadow-lg shadow-amarillo-volt/20">
                    SÍ, REGISTRARME
                </button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- LÓGICA JAVASCRIPT DEL MODAL Y VALIDACIÓN   -->
    <!-- ========================================== -->
    <script>
        // Clonamos la lista blanca del backend al frontend
        const DOMINIOS_PERMITIDOS = [
            'gmail.com', 
            'outlook.com', 
            'hotmail.com', 
            'yahoo.com', 
            'misena.edu.co', 
            'sena.edu.co'
        ];

        function mostrarModal() {
            const form = document.getElementById('registroForm');
            const emailInput = document.getElementById('email');

            // 1. Limpiamos alertas personalizadas previas
            emailInput.setCustomValidity('');

            // 2. Revisamos si hay campos vacíos o correos sin el arroba (@)
            if (!form.checkValidity()) {
                form.reportValidity(); // Esto lanza el letrerito de "Completa este campo"
                return;
            }

            // 3. Validación en tiempo real de la lista blanca (Frontend)
            const emailValor = emailInput.value.trim().toLowerCase();
            const partes = emailValor.split('@');
            
            if (partes.length === 2) {
                const dominio = partes[1];
                if (!DOMINIOS_PERMITIDOS.includes(dominio)) {
                    // Activamos el "letrerito" nativo de HTML5 con nuestro error
                    emailInput.setCustomValidity(`El dominio @${dominio} no está permitido. Usa un proveedor real.`);
                    form.reportValidity(); // Forzamos a que salga la alerta visual
                    return; // Detenemos el proceso para que NO se borre el formulario
                }
            }

            // 4. Si todo está perfecto, procedemos a llenar y mostrar el modal
            const rolSelect = document.getElementById('rol');
            const textoRol = rolSelect.options[rolSelect.selectedIndex].text;
            
            document.getElementById('modal-rol').innerText = textoRol;
            document.getElementById('modal-doc').innerText = document.getElementById('documento').value;
            document.getElementById('modal-nombres').innerText = document.getElementById('nombres').value;
            document.getElementById('modal-apellidos').innerText = document.getElementById('apellidos').value;
            document.getElementById('modal-tel').innerText = document.getElementById('telefono').value;
            document.getElementById('modal-fecha').innerText = document.getElementById('fecha_nacimiento').value;
            document.getElementById('modal-email').innerText = emailValor;

            document.getElementById('modalConfirmacion').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modalConfirmacion').classList.add('hidden');
        }

        function enviarFormulario() {
            document.getElementById('modalConfirmacion').classList.add('hidden');
            document.getElementById('registroForm').submit();
        }
    </script>
</body>
</html>
