<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Escuela de Fútbol</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        'negro-carbon': '#1A1A1A',
                        'gris-carbon': '#252525',
                        'naranja-fuego': '#E65100',
                        'naranja-suave': '#FFF3E0',
                        'blanco-humo': '#F5F5F5',
                        'amarillo-volt': '#EEFF41',
                        'gris-claro': '#B3B3B3'
                    }
                }
            }
        }
    </script>
    <style>
        .glass-effect {
            background: rgba(37, 37, 37, 0.85);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
    </style>
</head>
<body class="bg-gradient-to-br from-negro-carbon via-negro-carbon to-naranja-fuego/10 min-h-screen text-blanco-humo font-sans flex items-center justify-center p-4">

    <!-- Contenedor Principal del Formulario -->
    <div class="glass-effect p-8 rounded-3xl border border-white/5 w-full max-w-2xl shadow-2xl relative">
        <div class="text-center mb-8">
            <h1 class="text-3xl font-black mb-2">Únete al Equipo</h1>
            <p class="text-gris-claro text-sm">Crea tu cuenta como jugador o acudiente para empezar.</p>
        </div>

        <!-- Alertas de Error desde app.py -->
        {% if error %}
        <div class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-xl mb-6 text-center text-sm font-semibold">
            {{ error }}
        </div>
        {% endif %}

        <form id="registroForm" action="/registro" method="POST" class="space-y-5">
            <!-- Select Rol -->
            <div>
                <label class="block text-sm font-bold text-naranja-suave mb-1" for="rol">¿Qué rol tienes?</label>
                <select name="rol" id="rol" required
                    class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
                    <option value="" disabled selected>Selecciona una opción</option>
                    <option value="4">Soy Jugador (Independiente)</option>
                    <option value="5">Soy Acudiente (Padre/Madre/Tutor)</option>
                </select>
            </div>

            <!-- Grid para campos de dos columnas -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1" for="documento">Documento de Identidad</label>
                    <input type="text" name="documento" id="documento" required
                        inputmode="numeric" pattern="[0-9]+" minlength="1"
                        title="El documento solo puede contener números."
                        class="solo-numeros w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1" for="fecha_nacimiento">Fecha de Nacimiento</label>
                    <input type="date" name="fecha_nacimiento" id="fecha_nacimiento" required
                        class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors"
                        style="color-scheme: dark;">
                </div>
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1" for="nombres">Nombres</label>
                    <input type="text" name="nombres" id="nombres" required
                        pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑüÜ\s-]+"
                        title="Los nombres solo pueden contener letras."
                        class="solo-letras w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1" for="apellidos">Apellidos</label>
                    <input type="text" name="apellidos" id="apellidos" required
                        pattern="[a-zA-ZáéíóúÁÉÍÓÚñÑüÜ\s-]+"
                        title="Los apellidos solo pueden contener letras."
                        class="solo-letras w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1" for="telefono">Teléfono</label>
                    <input type="text" name="telefono" id="telefono" required
                        inputmode="numeric" pattern="[0-9]{10}" minlength="10" maxlength="10"
                        title="El teléfono debe tener exactamente 10 dígitos." 
                        class="solo-numeros w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
                </div>
                <div>
                    <label class="block text-sm font-bold text-naranja-suave mb-1" for="email">Correo Electrónico</label>
                    <input type="email" name="email" id="email" required
                        title="Ingresa un correo válido (ej: nombre@gmail.com)."
                        class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors"
                        placeholder="ejemplo@gmail.com">
                </div>
            </div>

            <!-- Contraseña -->
            <div>
                <label class="block text-sm font-bold text-naranja-suave mb-1" for="password">Contraseña</label>
                <input type="password" name="password" id="password" required minlength="4"
                    title="La contraseña debe tener al menos 4 caracteres."
                    class="w-full bg-gris-carbon border border-white/10 rounded-xl px-4 py-2.5 text-blanco-humo focus:outline-none focus:border-amarillo-volt transition-colors">
            </div>

            <div class="flex justify-between items-center mt-8 gap-4">
                <a href="/" class="text-sm text-gris-claro hover:text-white transition-colors">Volver al Login</a>
                <button type="button" id="btnContinuar" onclick="validarFormulario()"
                    class="bg-naranja-fuego hover:bg-orange-600 text-white font-bold py-3 px-8 rounded-xl transition-all shadow-lg shadow-naranja-fuego/20 disabled:opacity-40 disabled:cursor-not-allowed">
                    CONTINUAR REGISTRO
                </button>
            </div>
        </form>
    </div>

    <!-- ========================================== -->
    <!-- MODAL DE CONFIRMACIÓN DE DATOS -->
    <!-- ========================================== -->
    <div id="modalConfirmacion" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <!-- Fondo oscuro (Overlay) -->
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm" onclick="cerrarModal()"></div>
        
        <!-- Tarjeta del Modal -->
        <div class="bg-gris-carbon border border-white/10 rounded-3xl p-8 w-full max-w-md relative z-10 shadow-2xl">
            <div class="text-center mb-6">
                <div class="text-4xl mb-2 text-amarillo-volt">⚠️</div>
                <h3 class="text-xl font-black text-white">Confirmar Datos</h3>
                <p class="text-xs text-gris-claro mt-2">Por favor, verifica que tu información y rol sean correctos antes de enviar.</p>
            </div>

            <!-- Lista de datos capturados dinámicamente -->
            <div class="space-y-3 bg-negro-carbon/80 p-5 rounded-2xl border border-white/5 text-sm">
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Rol:</span>
                    <span id="modal-rol" class="font-bold text-amarillo-volt text-right"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Documento:</span>
                    <span id="modal-doc" class="text-white text-right break-all"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Nombres:</span>
                    <span id="modal-nombres" class="text-white text-right uppercase"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Apellidos:</span>
                    <span id="modal-apellidos" class="text-white text-right uppercase"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Teléfono:</span>
                    <span id="modal-tel" class="text-white text-right"></span>
                </div>
                <div class="flex justify-between border-b border-white/5 pb-2">
                    <span class="font-bold text-gris-claro">Nacimiento:</span>
                    <span id="modal-fecha" class="text-white text-right"></span>
                </div>
                <div class="flex justify-between items-center">
                    <span class="font-bold text-gris-claro">Correo:</span>
                    <span id="modal-email" class="text-white text-right text-xs break-all ml-4"></span>
                </div>
            </div>

            <!-- Botones del modal -->
            <div class="flex gap-4 mt-8">
                <button type="button" onclick="cerrarModal()" class="flex-1 py-3 bg-white/5 hover:bg-white/10 text-gris-claro hover:text-white text-xs font-bold rounded-xl transition-all border border-white/10">
                    CORREGIR
                </button>
                <button type="button" onclick="enviarFormulario()" class="flex-1 py-3 bg-amarillo-volt hover:bg-[#D4E637] text-negro-carbon text-xs font-black rounded-xl transition-all shadow-lg shadow-amarillo-volt/20">
                    SÍ, REGISTRARME
                </button>
            </div>
        </div>
    </div>

    <!-- ========================================== -->
    <!-- LÓGICA JAVASCRIPT DEL MODAL Y VALIDACIÓN   -->
    <!-- ========================================== -->
    <script src="{{ url_for('static', filename='js/validacion_campos.js') }}"></script>
    <script>
        const DOMINIOS_PERMITIDOS = [
            'gmail.com',
            'outlook.com',
            'hotmail.com',
            'yahoo.com',
            'misena.edu.co',
            'sena.edu.co'
        ];

        const CAMPOS = ['rol', 'documento', 'fecha_nacimiento', 'nombres', 'apellidos', 'telefono', 'email', 'password'];

        function limpiarCustomValidity() {
            CAMPOS.forEach(function (id) {
                var el = document.getElementById(id);
                if (el) el.setCustomValidity('');
            });
        }

        function calcularEdad(fechaStr) {
            var nac = new Date(fechaStr + 'T00:00:00');
            var hoy = new Date();
            var edad = hoy.getFullYear() - nac.getFullYear();
            var m = hoy.getMonth() - nac.getMonth();
            if (m < 0 || (m === 0 && hoy.getDate() < nac.getDate())) edad--;
            return edad;
        }

        function validarEmailDominio() {
            var emailInput = document.getElementById('email');
            var valor = emailInput.value.trim().toLowerCase();
            if (!valor) return;

            var partes = valor.split('@');
            if (partes.length !== 2) return;

            var dominio = partes[1];
            if (!DOMINIOS_PERMITIDOS.includes(dominio)) {
                emailInput.setCustomValidity(
                    'El dominio @' + dominio + ' no está permitido. Usa un correo real (ej: gmail.com).'
                );
            }
        }

        function validarEdadPorRol() {
            var rol = document.getElementById('rol').value;
            var fechaInput = document.getElementById('fecha_nacimiento');
            var fecha = fechaInput.value;
            if (!rol || !fecha) return;

            var edad = calcularEdad(fecha);
            if (rol === '5' && edad < 18) {
                fechaInput.setCustomValidity('Debes ser mayor de 18 años para registrarte como acudiente.');
            } else if (rol === '4' && edad < 10) {
                fechaInput.setCustomValidity('Debes tener al menos 10 años para registrarte como jugador.');
            } else if (rol === '4' && edad > 22) {
                fechaInput.setCustomValidity('La edad máxima para jugadores es 22 años.');
            }
        }

        function aplicarValidacionesCustom() {
            limpiarCustomValidity();
            validarEmailDominio();
            validarEdadPorRol();
        }

        function validarFormulario() {
            var form = document.getElementById('registroForm');
            aplicarValidacionesCustom();

            if (!form.checkValidity()) {
                form.reportValidity();
                return false;
            }

            mostrarModal();
            return false;
        }

        function actualizarEstadoBoton() {
            aplicarValidacionesCustom();
        }

        function mostrarModal() {
            var rolSelect = document.getElementById('rol');
            document.getElementById('modal-rol').innerText = rolSelect.options[rolSelect.selectedIndex].text;
            document.getElementById('modal-doc').innerText = document.getElementById('documento').value;
            document.getElementById('modal-nombres').innerText = document.getElementById('nombres').value;
            document.getElementById('modal-apellidos').innerText = document.getElementById('apellidos').value;
            document.getElementById('modal-tel').innerText = document.getElementById('telefono').value;
            document.getElementById('modal-fecha').innerText = document.getElementById('fecha_nacimiento').value;
            document.getElementById('modal-email').innerText = document.getElementById('email').value.trim().toLowerCase();
            document.getElementById('modalConfirmacion').classList.remove('hidden');
        }

        function cerrarModal() {
            document.getElementById('modalConfirmacion').classList.add('hidden');
        }

        function enviarFormulario() {
            document.getElementById('modalConfirmacion').classList.add('hidden');
            document.getElementById('registroForm').submit();
        }

        document.getElementById('registroForm').addEventListener('input', function (e) {
            if (e.target.setCustomValidity) e.target.setCustomValidity('');
            actualizarEstadoBoton();
        });

        document.getElementById('registroForm').addEventListener('change', actualizarEstadoBoton);
        document.getElementById('registroForm').addEventListener('submit', function (e) {
            e.preventDefault();
            validarFormulario();
        });
        document.addEventListener('DOMContentLoaded', actualizarEstadoBoton);
    </script>
</body>
</html>
